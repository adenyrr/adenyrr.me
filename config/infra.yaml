  # Grace
  - vm: "Stockage"
    node: "Grace"
    type: "VM"
    color: "green"
    services:
      - { name: "OpenMediaVault", description: "NAS System", status: "online" }
      - { name: "CEPH", description: "Distributed Storage", status: "online" }
      - { name: "SMB/NFS", description: "File Sharing", status: "online" }

  - vm: "Médias"
    node: "Grace"
    type: "VM"
    color: "green"
    services:
      - { name: "Jellyfin", description: "Media Server", status: "online" }
