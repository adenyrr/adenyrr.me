  # RPi 4
  - vm: "Home Assistant"
    node: "RPi 4"
    type: "Natif"
    color: "red"
    services:
      - { name: "Home Assistant", description: "Smart Home Hub", status: "online" }

# -----------------------------------------------------------------------------
# EXPOSITION WAN (Onglet WAN)
# -----------------------------------------------------------------------------
wanExposure:
  description: "Tous les services exposés sur Internet transitent par une chaîne de sécurité multicouche avant d'atteindre les VMs."
  chain:
    - step: "WAN / Internet"
      icon: "Globe"
      color: "red"
      description: "Trafic entrant depuis Internet"
    - step: "nginx (Edge)"
      icon: "Shield"
      color: "orange"
      description: "Reverse-proxy frontal"
      features:
        - "CrowdSec — blocage IPs malveillantes & comportements anormaux"
        - "Fail2Ban (F2B) — anti-brute-force"
        - "db-ip — géolocalisation IP & filtrage géographique"
        - "Rate limiting & headers sécurité"
    - step: "Traefik (par VM)"
      icon: "Network"
      color: "purple"
      description: "Reverse-proxy interne — une instance par VM"
      features:
        - "Routage par nom de domaine interne"
        - "TLS end-to-end via PKI interne (step-ca)"
        - "Certificats HTTPS pour chaque service"
        - "Middlewares d'authentification (Authentik)"
    - step: "PKI Interne (step-ca)"
      icon: "Lock"
      color: "green"
      description: "Autorité de certification privée"
      features:
        - "Génération & renouvellement automatique des certificats"
        - "HTTPS end-to-end garanti sur tout le LAN"
        - "Certificats X.509 pour chaque service"
    - step: "Services"
      icon: "Boxes"
      color: "cyan"
      description: "Chaque service exposé en HTTPS uniquement"

  exposedServices:
    - name: "Homepage"
      domain: "home.adenyrr.me"
      vm: "Frontend"
      node: "Grace"
    - name: "Grafana"
      domain: "metrics.adenyrr.me"
      vm: "Monitoring"
      node: "Anne"
    - name: "Immich"
      domain: "photos.adenyrr.me"
      vm: "Cloud"
      node: "Grace"
    - name: "OpenCloud"
      domain: "cloud.adenyrr.me"
      vm: "Cloud"
      node: "Grace"
    - name: "Jellyfin"
      domain: "media.adenyrr.me"
      vm: "Médias"
      node: "Grace"
    - name: "Open WebUI"
      domain: "ai.adenyrr.me"
      vm: "LLM"
      node: "Grace"
    - name: "Vaultwarden"
      domain: "vault.adenyrr.me"
      vm: "Cloud"
      node: "Grace"
    - name: "Authentik"
      domain: "auth.adenyrr.me"
      vm: "Cloud"
      node: "Grace"
