  - vm: "DCManager"
    node: "Anne"
    type: "VM"
    color: "purple"
    services:
      - { name: "PDM", description: "Proxmox Datacenter Manager", status: "online" }

  - vm: "PVE-Export"
    node: "Anne"
    type: "VM"
    color: "purple"
