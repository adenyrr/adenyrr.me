# =============================================================================
# CONFIGURATION DE L'INFRASTRUCTURE
# =============================================================================
# Modifiez ce fichier pour mettre à jour toutes les informations affichées.
# Chaque onglet peut être activé/désactivé individuellement.
# =============================================================================

# -----------------------------------------------------------------------------
# PARAMÈTRES GÉNÉRAUX
# -----------------------------------------------------------------------------
documentation:
  url: "https://docu.adenyrr.me"
  label: "Documentation complète"

stats:
  totalCpuCores: 32
  totalRamGB: 80
  totalServices: 18
  cephStorage: "3×2 To"
  nasStorage: "2×12 To"

# -----------------------------------------------------------------------------
# OPTIONS D'AFFICHAGE
# -----------------------------------------------------------------------------
display:
  hideMonitoring: true
  hideThroughput: true

# -----------------------------------------------------------------------------
# ONGLETS (activables/désactivables)
# -----------------------------------------------------------------------------
tabs:
  services:
    enabled: true
    label: "/srv"
    icon: "Boxes"
  lan:
    enabled: true
    label: "/lan"
    icon: "Network"
  wan:
    enabled: true
    label: "/wan"
    icon: "Globe"
  graph:
    enabled: true
    label: "/graph"
    icon: "GitBranch"

# -----------------------------------------------------------------------------
# NODES PROXMOX
# -----------------------------------------------------------------------------
proxmoxNodes:
  - name: "Amélia"
    cpu: "Intel i7-6700K"
    ram: "8c / 16 GB"
    color: "cyan"
    services:
      - { name: "CEPH (mon, mgr, osd)", type: "Natif" }
      - { name: "Opensense", type: "VM" }
      - { name: "SIEM", type: "VM" }
      - { name: "DNS", type: "LXC" }
      - { name: "Net-tools", type: "LXC" }
      - { name: "Proxy", type: "LXC" }
      - { name: "ACME", type: "LXC" }

  - name: "Anne"
    cpu: "AMD Ryzen 5 3500 GE Pro"
    ram: "8c / 16 GB"
    color: "purple"
    services:
      - { name: "CEPH (mon, mgr)", type: "Natif" }
      - { name: "Forgejo", type: "LXC" }
      - { name: "Deploy", type: "LXC" }
      - { name: "Analytics", type: "LXC" }
      - { name: "Monitoring", type: "LXC" }
      - { name: "DCManager", type: "LXC" }
      - { name: "PVE-Export", type: "LXC" }

  - name: "Grace"
    cpu: "AMD Ryzen 7 2700X"
    ram: "16c / 48 GB"
    color: "green"
    services:
      - { name: "CEPH (mon, mgr, osd)", type: "Natif" }
      - { name: "Stockage", type: "VM" }
      - { name: "Médias", type: "VM" }
      - { name: "Cloud", type: "VM" }
      - { name: "Frontend", type: "VM" }
      - { name: "LLM", type: "VM" }
      - { name: "Lab", type: "VM" }
      - { name: "KubeMaster", type: "VM" }
      - { name: "KubeWorker", type: "VM" }

# -----------------------------------------------------------------------------
# PÉRIPHÉRIQUES RÉSEAU
# -----------------------------------------------------------------------------
networkDevices:
  - name: "RPi 4"
    cpu: "ARM Cortex-A72"
    ram: "4 GB"
    color: "red"
    icon: "Server"
    services:
      - { name: "Home Assistant", type: "Natif" }

  - name: "Routeur Opensense"
    cpu: "NIC Intel 4x2.5G"
    ram: "Full open-source"
    color: "orange"
    icon: "Router"
    services:
      - { name: "Firewall", type: "Natif" }
      - { name: "VPN", type: "Natif" }
      - { name: "DHCP/DNS", type: "Natif" }

  - name: "Ubiquiti Unifi AP"
    cpu: "WiFi 6 - MESH"
    ram: "Point d'accès"
    color: "blue"
    icon: "Wifi"
    services:
      - { name: "WiFi 2.4GHz", type: "Natif" }
      - { name: "WiFi 5GHz", type: "Natif" }

# -----------------------------------------------------------------------------
# VLANS
# -----------------------------------------------------------------------------
vlans:
  # Infrastructure Critique
  - name: "LAN 10 (INFRA)"
    subnet: "/29"
    icon: "Server"
    devices: ["Amélia", "Anne", "Grâce"]
    category: "critical"
    color: "red"

  - name: "LAN 20 (ADMIN)"
    subnet: "/29"
    icon: "Monitor"
    devices: ["Komodo", "Cockpit", "Grafana", "..."]
    category: "critical"
    color: "red"

  - name: "LAN 30 (POULE)"
    subnet: "/30"
    icon: "HardDrive"
    devices: ["OpenMediaVault", "CEPH", "SMB"]
    category: "critical"
    color: "red"

  # Production
  - name: "LAN 40 (FORGE)"
    subnet: "/24"
    icon: "GitBranch"
    devices: ["ForgeJo"]
    category: "production"
    color: "blue"

  - name: "LAN 50 (SERVICES)"
    subnet: "/24"
    icon: "Boxes"
    devices: ["Authentik", "Jellyfin", "Immich", "..."]
    category: "production"
    color: "blue"

  - name: "LAN 60 (KUBE)"
    subnet: "/29"
    icon: "Workflow"
    devices: ["Cluster Kubernetes", "Réservé MetalLB"]
    category: "production"
    color: "blue"

  # Réseau
  - name: "LAN 1 (NATIF)"
    subnet: "/28"
    icon: "Network"
    devices: ["Switch"]
    category: "network"
    color: "green"

  - name: "LAN 80 (DNSPROXY)"
    subnet: "/30"
    icon: "HardDrive"
    devices: ["DNS", "Proxy"]
    category: "network"
    color: "green"

  - name: "LAN 150 (IoT)"
    subnet: "/24"
    icon: "Wifi"
    devices: ["IoT"]
    category: "access"
    color: "purple"

  # Accès
  - name: "LAN 90 (PRINT)"
    subnet: "/29"
    icon: "Printer"
    devices: ["PRINT", "PRINT3D"]
    category: "access"
    color: "purple"

  - name: "LAN 100 (W.Fi)"
    subnet: "/24"
    icon: "Wifi"
    devices: ["Amplifi Mesh"]
    category: "access"
    color: "purple"

# -----------------------------------------------------------------------------
# SERVICES DÉTAILLÉS (par VM/LXC)
# -----------------------------------------------------------------------------
serviceGroups:
